<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 运维监控面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        h1 span { color: #00d9ff; }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .status-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card-title { font-size: 18px; font-weight: 600; }
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-running { background: linear-gradient(135deg, #00c853, #69f0ae); color: #000; }
        .status-stopped { background: linear-gradient(135deg, #ff5252, #ff8a80); color: #fff; }
        .status-unknown { background: linear-gradient(135deg, #9e9e9e, #bdbdbd); color: #000; }

        .card-content { font-size: 14px; line-height: 1.8; }
        .card-content .label { color: #aaa; margin-right: 8px; }
        .card-content .value { color: #00d9ff; font-weight: 500; }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, #2196f3, #21cbf3); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #00c853, #69f0ae); color: #000; }
        .btn-danger { background: linear-gradient(135deg, #ff5252, #ff8a80); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #ff9800, #ffb74d); color: #000; }

        .log-section {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .log-title { font-size: 18px; font-weight: 600; }
        .log-content {
            background: #0d1117;
            border-radius: 10px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #c9d1d9;
        }
        .log-content .error { color: #ff5252; }
        .log-content .success { color: #00c853; }
        .log-content .info { color: #2196f3; }

        .diagnose-section {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .issue-item {
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border-left: 4px solid #2196f3;
        }
        .issue-item.error { border-left-color: #ff5252; }
        .issue-item.warning { border-left-color: #ff9800; }
        .issue-item.success { border-left-color: #00c853; }
        .suggestion {
            padding: 12px 15px;
            margin: 8px 0 8px 20px;
            border-radius: 8px;
            background: rgba(33,150,243,0.1);
            font-size: 14px;
        }

        .action-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .time-display {
            text-align: center;
            color: #aaa;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖥️ ERP <span>运维监控面板</span></h1>

        <div class="action-bar">
            <button class="btn btn-primary" onclick="refreshStatus()">🔄 刷新状态</button>
            <button class="btn btn-success" onclick="startBackend()">▶️ 后端</button>
            <button class="btn btn-danger" onclick="stopBackend()">⏹️ 后端</button>
            <button class="btn btn-success" onclick="startFrontend()">▶️ 前端</button>
            <button class="btn btn-danger" onclick="stopFrontend()">⏹️ 前端</button>
            <button class="btn btn-success" onclick="startMysql()">▶️ MySQL</button>
            <button class="btn btn-danger" onclick="stopMysql()">⏹️ MySQL</button>
            <button class="btn btn-success" onclick="startRedis()">▶️ Redis</button>
            <button class="btn btn-danger" onclick="stopRedis()">⏹️ Redis</button>
            <button class="btn btn-warning" onclick="buildProject()">🔨 编译</button>
            <button class="btn btn-primary" onclick="openERP()">🌐 ERP</button>
            <button class="btn btn-danger" onclick="stopAll()">🛑 全部停止</button>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="card-header">
                    <span class="card-title">🐍 后端服务</span>
                    <span id="backend-badge" class="status-badge status-unknown">检查中...</span>
                </div>
                <div class="card-content">
                    <div><span class="label">端口:</span><span class="value">8080</span></div>
                    <div><span class="label">进程ID:</span><span id="backend-pid" class="value">-</span></div>
                    <div><span class="label">JAR文件:</span><span id="jar-status" class="value">-</span></div>
                </div>
            </div>

            <div class="status-card">
                <div class="card-header">
                    <span class="card-title">🗄️ MySQL 数据库</span>
                    <span id="mysql-badge" class="status-badge status-unknown">检查中...</span>
                </div>
                <div class="card-content">
                    <div><span class="label">端口:</span><span class="value">3306</span></div>
                    <div><span class="label">状态:</span><span id="mysql-status" class="value">检查中...</span></div>
                </div>
            </div>

            <div class="status-card">
                <div class="card-header">
                    <span class="card-title">📦 Redis 缓存</span>
                    <span id="redis-badge" class="status-badge status-unknown">检查中...</span>
                </div>
                <div class="card-content">
                    <div><span class="label">端口:</span><span class="value">6379</span></div>
                    <div><span class="label">状态:</span><span id="redis-status" class="value">检查中...</span></div>
                </div>
            </div>

            <div class="status-card">
                <div class="card-header">
                    <span class="card-title">🌐 前端服务</span>
                    <span id="frontend-badge" class="status-badge status-unknown">检查中...</span>
                </div>
                <div class="card-content">
                    <div><span class="label">端口:</span><span class="value">80</span></div>
                    <div><span class="label">状态:</span><span id="frontend-status" class="value">检查中...</span></div>
                </div>
            </div>
        </div>

        <div class="diagnose-section">
            <div class="log-header">
                <span class="log-title">🔍 诊断结果</span>
                <button class="btn btn-warning" onclick="diagnose()" style="padding: 8px 16px; min-width: auto;">重新诊断</button>
            </div>
            <div id="diagnose-content"></div>
        </div>

        <div class="log-section">
            <div class="log-header">
                <span class="log-title">📋 实时日志</span>
                <button class="btn btn-primary" onclick="getLogs()" style="padding: 8px 16px; min-width: auto;">刷新日志</button>
            </div>
            <div id="log-content" class="log-content">点击"刷新日志"查看后端运行日志...</div>
        </div>

        <div class="time-display">
            最后更新: <span id="last-update">-</span>
        </div>
    </div>

    <script>
        let buildInProgress = false;

        function setBadge(id, running) {
            const el = document.getElementById(id);
            if (running) {
                el.className = 'status-badge status-running';
                el.textContent = '运行中';
            } else {
                el.className = 'status-badge status-stopped';
                el.textContent = '已停止';
            }
        }

        function formatTime() {
            const now = new Date();
            return now.toLocaleString('zh-CN');
        }

        async function refreshStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                setBadge('backend-badge', data.backend.running);
                document.getElementById('backend-pid').textContent = data.backend.pid || '-';

                document.getElementById('jar-status').textContent = data.jar_exists ? '✅ 存在 (' + data.jar_time + ')' : '❌ 不存在';

                setBadge('mysql-badge', data.mysql.running);
                document.getElementById('mysql-status').textContent = data.mysql.running ? '✅ 正常' : '❌ 未运行';

                setBadge('redis-badge', data.redis.running);
                document.getElementById('redis-status').textContent = data.redis.running ? '✅ 正常' : '❌ 未运行';

                fetch('/api/status').then(r => r.json()).then(d => {
                    setBadge('frontend-badge', true);
                    document.getElementById('frontend-status').textContent = '✅ 正常';
                }).catch(() => {
                    setBadge('frontend-badge', false);
                    document.getElementById('frontend-status').textContent = '❌ 未运行';
                });

                document.getElementById('last-update').textContent = formatTime();
            } catch (e) {
                console.error('获取状态失败:', e);
            }
        }

        async function startBackend() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>启动中...';

            try {
                const res = await fetch('/api/start', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 5000);
            } catch (e) {
                alert('启动失败: ' + e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '▶️ 启动后端';
            }
        }

        async function stopBackend() {
            if (!confirm('确定要停止后端服务吗？')) return;

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>停止中...';

            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 2000);
            } catch (e) {
                alert('停止失败: ' + e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '⏹️ 停止后端';
            }
        }

        async function startFrontend() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>启动中...';

            try {
                const res = await fetch('/api/start-frontend', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 5000);
            } catch (e) {
                alert('启动失败: ' + e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '▶️ 启动前端';
            }
        }

        async function stopFrontend() {
            if (!confirm('确定要停止前端服务吗？')) return;

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>停止中...';

            try {
                const res = await fetch('/api/stop-frontend', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 2000);
            } catch (e) {
                alert('停止失败: ' + e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '⏹️ 停止前端';
            }
        }

        async function stopAll() {
            if (!confirm('确定要停止所有服务吗？这将关闭前端和后端。')) return;

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>停止中...';

            try {
                const res = await fetch('/api/stop-all', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 2000);
            } catch (e) {
                alert('停止失败: ' + e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🛑 停止全部';
            }
        }

        async function startMysql() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '...';
            try {
                const res = await fetch('/api/start-mysql', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 3000);
            } catch (e) { alert('启动失败: ' + e);
            } finally { btn.disabled = false; btn.innerHTML = '▶️ MySQL'; }
        }

        async function stopMysql() {
            if (!confirm('确定要停止 MySQL 吗？')) return;
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '...';
            try {
                const res = await fetch('/api/stop-mysql', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 2000);
            } catch (e) { alert('停止失败: ' + e);
            } finally { btn.disabled = false; btn.innerHTML = '⏹️ MySQL'; }
        }

        async function startRedis() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '...';
            try {
                const res = await fetch('/api/start-redis', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 3000);
            } catch (e) { alert('启动失败: ' + e);
            } finally { btn.disabled = false; btn.innerHTML = '▶️ Redis'; }
        }

        async function stopRedis() {
            if (!confirm('确定要停止 Redis 吗？')) return;
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '...';
            try {
                const res = await fetch('/api/stop-redis', { method: 'POST' });
                const data = await res.json();
                alert(data.message);
                setTimeout(refreshStatus, 2000);
            } catch (e) { alert('停止失败: ' + e);
            } finally { btn.disabled = false; btn.innerHTML = '⏹️ Redis'; }
        }

        async function buildProject() {
            if (buildInProgress) {
                alert('编译正在进行中，请稍候...');
                return;
            }

            if (!confirm('确定要编译项目吗？这可能需要几分钟。')) return;

            buildInProgress = true;
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>编译中...';

            const logDiv = document.getElementById('log-content');
            logDiv.innerHTML = '<span class="info">开始编译项目...</span>\n';

            try {
                const res = await fetch('/api/build');
                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const text = decoder.decode(value);
                    const lines = text.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const content = line.substring(6);
                            if (content.includes('BUILD SUCCESS')) {
                                logDiv.innerHTML += '<span class="success">✅ 编译成功！</span>\n';
                            } else if (content.includes('BUILD FAILURE') || content.includes('__BUILD_FAILED__')) {
                                logDiv.innerHTML += '<span class="error">❌ 编译失败</span>\n';
                            } else if (content) {
                                logDiv.innerHTML += content + '\n';
                            }
                            logDiv.scrollTop = logDiv.scrollHeight;
                        }
                    }
                }
            } catch (e) {
                logDiv.innerHTML += '<span class="error">编译出错: ' + e + '</span>\n';
            } finally {
                buildInProgress = false;
                btn.disabled = false;
                btn.innerHTML = '🔨 编译项目';
                refreshStatus();
            }
        }

        async function getLogs() {
            const logDiv = document.getElementById('log-content');
            logDiv.innerHTML = '<span class="info">加载日志中...</span>';

            try {
                const res = await fetch('/api/logs?type=info&lines=50');
                const data = await res.json();

                if (data.logs && data.logs.length > 0) {
                    logDiv.innerHTML = data.logs.map(line => {
                        if (line.includes('ERROR') || line.includes('Exception')) {
                            return '<span class="error">' + line + '</span>';
                        } else if (line.includes('SUCCESS') || line.includes('成功')) {
                            return '<span class="success">' + line + '</span>';
                        }
                        return line;
                    }).join('\n');
                } else {
                    logDiv.innerHTML = '暂无日志';
                }
            } catch (e) {
                logDiv.innerHTML = '获取日志失败: ' + e;
            }
        }

        async function diagnose() {
            const content = document.getElementById('diagnose-content');
            content.innerHTML = '<span class="info">诊断中...</span>';

            try {
                const res = await fetch('/api/diagnose');
                const data = await res.json();

                let html = '';
                for (const issue of data.issues) {
                    let cls = 'info';
                    if (issue.includes('❌')) cls = 'error';
                    else if (issue.includes('⚠️')) cls = 'warning';
                    else if (issue.includes('✅')) cls = 'success';
                    html += '<div class="issue-item ' + cls + '">' + issue + '</div>';
                }
                for (const sug of data.suggestions) {
                    html += '<div class="suggestion">💡 ' + sug + '</div>';
                }
                content.innerHTML = html;
            } catch (e) {
                content.innerHTML = '诊断失败: ' + e;
            }
        }

        function openERP() {
            window.open('http://localhost:80', '_blank');
        }

        // 初始化
        refreshStatus();
        diagnose();
        setInterval(refreshStatus, 30000);
    </script>
</body>
</html>
