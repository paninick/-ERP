<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP - 主控制程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .status-item {
            background: #f0f4ff;
            padding: 15px 25px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .status-item .label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .status-item .value {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #667eea;
            border-radius: 2px;
        }

        .skills-list {
            display: grid;
            gap: 10px;
        }

        .skill-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .skill-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .skill-desc {
            color: #666;
            font-size: 0.9em;
        }

        .skill-priority {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 8px;
        }

        .priority-P0 {
            background: #ff4757;
            color: white;
        }

        .priority-P1 {
            background: #ffa502;
            color: white;
        }

        .priority-P2 {
            background: #2ed573;
            color: white;
        }

        .execute-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #333;
            font-weight: 600;
        }

        .form-group select,
        .form-group textarea,
        .form-group input {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group select:focus,
        .form-group textarea:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .response-area {
            margin-top: 20px;
        }

        .response-area h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .response-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .tasks-section {
            grid-column: 1 / -1;
        }

        .tasks-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tasks-table th,
        .tasks-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .tasks-table th {
            background: #f0f4ff;
            color: #667eea;
            font-weight: bold;
        }

        .tasks-table tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-COMPLETED {
            background: #2ed573;
            color: white;
        }

        .status-RUNNING {
            background: #ffa502;
            color: white;
        }

        .status-PENDING {
            background: #70a1ff;
            color: white;
        }

        .status-FAILED {
            background: #ff4757;
            color: white;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn {
            background: #f0f4ff;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #667eea;
            color: white;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-header h2 {
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 MCP - 主控制程序</h1>
            <p>Expert Group Skill Invocation System - 专家团技能调用系统</p>
            <div class="status-bar" id="statusBar">
                <div class="status-item">
                    <div class="label">系统状态</div>
                    <div class="value" id="serverStatus">加载中...</div>
                </div>
                <div class="status-item">
                    <div class="label">运行时间</div>
                    <div class="value" id="uptime">--</div>
                </div>
                <div class="status-item">
                    <div class="label">技能总数</div>
                    <div class="value" id="skillCount">--</div>
                </div>
                <div class="status-item">
                    <div class="label">任务总数</div>
                    <div class="value" id="taskCount">--</div>
                </div>
                <div class="status-item">
                    <div class="label">成功率</div>
                    <div class="value" id="successRate">--</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <div class="card-header">
                    <h2>🛠️ 可用技能</h2>
                    <button class="refresh-btn" onclick="loadSkills()">🔄 刷新</button>
                </div>
                <div class="skills-list" id="skillsList">
                    <div class="loading active">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>⚡ 执行技能</h2>
                <form class="execute-form" id="executeForm">
                    <div class="form-group">
                        <label for="taskId">任务 ID（可选）</label>
                        <input type="text" id="taskId" placeholder="自动生成或自定义">
                    </div>
                    <div class="form-group">
                        <label for="taskType">任务类型</label>
                        <select id="taskType">
                            <option value="SEARCH">搜索</option>
                            <option value="FILE_OPERATION">文件操作</option>
                            <option value="PROJECT_MANAGEMENT">项目管理</option>
                            <option value="SYSTEM_TOOL">系统工具</option>
                            <option value="MCP_TOOL">MCP 工具</option>
                            <option value="DIAGNOSTIC">诊断</option>
                            <option value="WEB">Web</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="priority">优先级</label>
                        <select id="priority">
                            <option value="P0">P0 - 最高</option>
                            <option value="P1">P1 - 高</option>
                            <option value="P2">P2 - 中</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="skillName">技能名称</label>
                        <select id="skillName">
                            <option value="">选择技能...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="parameters">参数 (JSON)</label>
                        <textarea id="parameters" placeholder='{"message": "Hello", "a": 1, "b": 2}'></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="executeBtn">
                        🚀 执行技能
                    </button>
                </form>
                <div class="response-area" id="responseArea" style="display: none;">
                    <h3>📋 响应</h3>
                    <div class="response-box" id="responseBox"></div>
                </div>
            </div>

            <div class="card tasks-section">
                <div class="card-header">
                    <h2>📊 任务列表</h2>
                    <button class="refresh-btn" onclick="loadTasks()">🔄 刷新</button>
                </div>
                <div id="tasksContent">
                    <div class="loading active">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        async function fetchAPI(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        async function loadStatus() {
            try {
                const data = await fetchAPI('/');
                document.getElementById('serverStatus').textContent = '✅ 运行中';
                document.getElementById('uptime').textContent = `${Math.floor(data.statistics.uptime_seconds)}秒`;
                document.getElementById('skillCount').textContent = data.statistics.skills_enabled;
                document.getElementById('taskCount').textContent = data.statistics.task_statistics.total_tasks;
                document.getElementById('successRate').textContent = `${data.statistics.task_statistics.success_rate.toFixed(1)}%`;
            } catch (error) {
                document.getElementById('serverStatus').textContent = '❌ 连接失败';
            }
        }

        async function loadSkills() {
            const skillsList = document.getElementById('skillsList');
            skillsList.innerHTML = '<div class="loading active"><div class="spinner"></div>加载中...</div>';
            
            try {
                const skills = await fetchAPI('/skills');
                skillsList.innerHTML = skills.map(skill => `
                    <div class="skill-item">
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-desc">${skill.description}</div>
                        <span class="skill-priority priority-${skill.priority}">${skill.priority}</span>
                        <span style="margin-left: 8px; color: ${skill.enabled ? '#2ed573' : '#ff4757'}">
                            ${skill.enabled ? '✅ 已启用' : '❌ 已禁用'}
                        </span>
                    </div>
                `).join('');

                const skillSelect = document.getElementById('skillName');
                skillSelect.innerHTML = '<option value="">选择技能...</option>';
                skills.forEach(skill => {
                    if (skill.enabled) {
                        skillSelect.innerHTML += `<option value="${skill.name}">${skill.name} - ${skill.description}</option>`;
                    }
                });
            } catch (error) {
                skillsList.innerHTML = '<div style="color: #ff4757; text-align: center;">加载失败</div>';
            }
        }

        async function loadTasks() {
            const tasksContent = document.getElementById('tasksContent');
            tasksContent.innerHTML = '<div class="loading active"><div class="spinner"></div>加载中...</div>';
            
            try {
                const tasks = await fetchAPI('/tasks');
                
                if (tasks.length === 0) {
                    tasksContent.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">暂无任务</div>';
                    return;
                }

                tasksContent.innerHTML = `
                    <table class="tasks-table">
                        <thead>
                            <tr>
                                <th>任务 ID</th>
                                <th>任务名称</th>
                                <th>类型</th>
                                <th>优先级</th>
                                <th>状态</th>
                                <th>进度</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tasks.map(task => `
                                <tr>
                                    <td><code>${task.taskId}</code></td>
                                    <td>${task.taskName}</td>
                                    <td>${task.taskType}</td>
                                    <td>${task.priority}</td>
                                    <td><span class="status-badge status-${task.status}">${task.status}</span></td>
                                    <td>${task.progress.toFixed(0)}%</td>
                                    <td>${new Date(task.createdAt).toLocaleString('zh-CN')}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                tasksContent.innerHTML = '<div style="color: #ff4757; text-align: center;">加载失败</div>';
            }
        }

        async function executeSkill(event) {
            event.preventDefault();
            
            const executeBtn = document.getElementById('executeBtn');
            const responseArea = document.getElementById('responseArea');
            const responseBox = document.getElementById('responseBox');
            
            executeBtn.disabled = true;
            executeBtn.textContent = '⏳ 执行中...';
            responseArea.style.display = 'none';
            
            try {
                const taskId = document.getElementById('taskId').value || `TASK-${Date.now()}`;
                const taskType = document.getElementById('taskType').value;
                const priority = document.getElementById('priority').value;
                const skillName = document.getElementById('skillName').value;
                let parameters = {};
                
                try {
                    const paramText = document.getElementById('parameters').value;
                    if (paramText.trim()) {
                        parameters = JSON.parse(paramText);
                    }
                } catch (e) {
                    alert('参数 JSON 格式错误');
                    executeBtn.disabled = false;
                    executeBtn.textContent = '🚀 执行技能';
                    return;
                }

                if (!skillName) {
                    alert('请选择技能');
                    executeBtn.disabled = false;
                    executeBtn.textContent = '🚀 执行技能';
                    return;
                }

                const request = {
                    taskId: taskId,
                    taskType: taskType,
                    priority: priority,
                    skills: [{
                        name: skillName,
                        parameters: parameters
                    }],
                    executionMode: 'SYNC'
                };

                const response = await fetchAPI('/execute', {
                    method: 'POST',
                    body: JSON.stringify(request)
                });

                responseArea.style.display = 'block';
                responseBox.textContent = JSON.stringify(response, null, 2);
                
                loadStatus();
                loadTasks();
            } catch (error) {
                responseArea.style.display = 'block';
                responseBox.textContent = `错误: ${error.message}`;
            } finally {
                executeBtn.disabled = false;
                executeBtn.textContent = '🚀 执行技能';
            }
        }

        document.getElementById('executeForm').addEventListener('submit', executeSkill);

        loadStatus();
        loadSkills();
        loadTasks();

        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
